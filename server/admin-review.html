<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Annotation review</title>
    <style>
      :root { color-scheme: light; font-family: Inter, Arial, sans-serif; color: #17282d; background: #eff5f3; }
      body { margin: 0; min-width: 320px; }
      header { position: sticky; top: 0; z-index: 2; display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: center; padding: 16px 22px; border-bottom: 1px solid #cfe0db; background: rgba(255, 255, 255, .96); box-shadow: 0 6px 20px rgba(31, 61, 56, .08); }
      h1, p { margin: 0; } h1 { font-size: 18px; } .label { margin-top: 5px; color: #52716b; font-size: 13px; } .request { max-width: 620px; padding: 10px 12px; border-radius: 10px; background: #fff5df; color: #5b3a0d; font-size: 13px; line-height: 1.4; }
      #status { padding: 14px 22px; color: #9a3b18; } iframe { display: block; width: 100%; height: calc(100vh - 108px); border: 0; background: #f3f5f3; }
      @media (max-width: 760px) { header { grid-template-columns: 1fr; } iframe { height: calc(100vh - 170px); } }
    </style>
  </head>
  <body>
    <header>
      <div><h1>Element annotation review</h1><p class="label" id="target">Waiting for dashboard authorization…</p></div>
      <p class="request" id="request">This view is visible only to an administrator who opened it from the dashboard.</p>
    </header>
    <p id="status"></p>
    <iframe id="configurator" title="Annotated configurator page" hidden></iframe>
    <script>
      const annotationId = Number(window.location.hash.slice(1));
      const target = document.getElementById("target");
      const request = document.getElementById("request");
      const status = document.getElementById("status");
      const frame = document.getElementById("configurator");
      const escape = (value) => String(value || "").replace(/[&<>\"]/g, (character) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[character]));

      function highlightAnnotation(annotation) {
        const page = frame.contentDocument;
        if (!page) return;
        let element = null;
        try { element = annotation.targetSelector ? page.querySelector(annotation.targetSelector) : null; } catch { element = null; }
        if (!element && annotation.targetText) {
          element = [...page.querySelectorAll("button, label, h1, h2, h3, h4, p, .item-card, .option-card, .scenario-card")]
            .find((node) => node.textContent.replace(/\s+/g, " ").trim().includes(annotation.targetText));
        }
        if (!element) { status.textContent = "The original element could not be matched in the current page version."; return; }
        const style = page.createElement("style");
        style.textContent = ".annotation-review-highlight { outline: 4px solid #d18a25 !important; outline-offset: 5px !important; box-shadow: 0 0 0 8px rgba(209, 138, 37, .18) !important; position: relative; z-index: 1; }";
        page.head.append(style);
        element.classList.add("annotation-review-highlight");
        element.scrollIntoView({ block: "center", behavior: "smooth" });
        status.textContent = "Highlighted element shown below. This marker exists only in this administrator review window.";
      }

      function loadReview(token) {
        if (!Number.isInteger(annotationId) || annotationId < 1) { status.textContent = "Invalid annotation reference."; return; }
        fetch(`/api/admin/annotations/${annotationId}`, { headers: { Authorization: `Bearer ${token}` } })
          .then((response) => { if (!response.ok) throw new Error(response.status === 401 ? "Administrator authorization failed." : "Annotation could not be loaded."); return response.json(); })
          .then(({ annotation }) => {
            target.textContent = `Selected element: ${annotation.targetLabel || "Unknown"} · ${annotation.productName || "Product"} / step ${annotation.step || "—"}`;
            request.textContent = annotation.message || "No change request was provided.";
            frame.hidden = false;
            frame.addEventListener("load", () => {
              frame.contentWindow.postMessage({ type: "annotation-review-state", state: annotation.reviewState }, window.location.origin);
              window.setTimeout(() => highlightAnnotation(annotation), 450);
            }, { once: true });
            frame.src = "/";
          })
          .catch((error) => { status.textContent = error.message; });
      }

      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin || event.data?.type !== "annotation-review-auth" || Number(event.data.id) !== annotationId) return;
        loadReview(event.data.token);
      });
      if (window.opener) window.opener.postMessage({ type: "annotation-review-ready", id: annotationId }, window.location.origin);
      else status.textContent = "Open this page from the administrator dashboard to review an annotation.";
    </script>
  </body>
</html>
